<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Orb</title>
<style>
  html,body{margin:0;height:100%;background:transparent;overflow:hidden}
  canvas{display:block;width:100%!important;height:100%!important}
  body.nogl{background:radial-gradient(circle at 47% 42%, #e1e2e5 0%, #AFC8CD 38%, #6E8AA0 64%, #19212a 90%, transparent 95%)}
</style>
</head>
<body>
<script src="../vendor/three.min.js"></script>
<script>
(function () {
  if (!window.THREE) { document.body.classList.add('nogl'); return; }
  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var vertexShader = [
    'varying vec2 vUv;',
    'void main(){ vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }'
  ].join('\n');

  // Ported from the ElevenLabs Orb shader (GLSL3 features mapped to GLSL1: texture()->texture2D, array constructor unrolled)
  var fragmentShader = [
    'uniform float uTime;',
    'uniform float uAnimation;',
    'uniform float uInverted;',
    'uniform float uOffsets[7];',
    'uniform vec3 uColor1;',
    'uniform vec3 uColor2;',
    'uniform float uInputVolume;',
    'uniform float uOutputVolume;',
    'uniform float uOpacity;',
    'uniform sampler2D uPerlinTexture;',
    'varying vec2 vUv;',
    'const float PI = 3.14159265358979323846;',
    'bool drawOval(vec2 polarUv, vec2 polarCenter, float a, float b, bool reverseGradient, float softness, out vec4 color){',
    '  vec2 p = polarUv - polarCenter;',
    '  float oval = (p.x * p.x) / (a * a) + (p.y * p.y) / (b * b);',
    '  float edge = smoothstep(1.0, 1.0 - softness, oval);',
    '  if (edge > 0.0){',
    '    float gradient = reverseGradient ? (1.0 - (p.x / a + 1.0) / 2.0) : ((p.x / a + 1.0) / 2.0);',
    '    gradient = mix(0.5, gradient, 0.1);',
    '    color = vec4(vec3(gradient), 0.85 * edge);',
    '    return true;',
    '  }',
    '  return false;',
    '}',
    'vec3 colorRamp(float grayscale, vec3 color1, vec3 color2, vec3 color3, vec3 color4){',
    '  if (grayscale < 0.33){ return mix(color1, color2, grayscale * 3.0); }',
    '  else if (grayscale < 0.66){ return mix(color2, color3, (grayscale - 0.33) * 3.0); }',
    '  else { return mix(color3, color4, (grayscale - 0.66) * 3.0); }',
    '}',
    'vec2 hash2(vec2 p){ return fract(sin(vec2(dot(p, vec2(127.1, 311.7)), dot(p, vec2(269.5, 183.3)))) * 43758.5453); }',
    'float noise2D(vec2 p){',
    '  vec2 i = floor(p); vec2 f = fract(p); vec2 u = f * f * (3.0 - 2.0 * f);',
    '  float n = mix(mix(dot(hash2(i + vec2(0.0, 0.0)), f - vec2(0.0, 0.0)), dot(hash2(i + vec2(1.0, 0.0)), f - vec2(1.0, 0.0)), u.x),',
    '                mix(dot(hash2(i + vec2(0.0, 1.0)), f - vec2(0.0, 1.0)), dot(hash2(i + vec2(1.0, 1.0)), f - vec2(1.0, 1.0)), u.x), u.y);',
    '  return 0.5 + 0.5 * n;',
    '}',
    'float sharpRing(vec3 decomposed, float time){',
    '  float ringStart = 1.0; float ringWidth = 0.3; float noiseScale = 5.0;',
    '  float noise = mix(noise2D(vec2(decomposed.x, time) * noiseScale), noise2D(vec2(decomposed.y, time) * noiseScale), decomposed.z);',
    '  noise = (noise - 0.5) * 2.5;',
    '  return ringStart + noise * ringWidth * 1.5;',
    '}',
    'float smoothRing(vec3 decomposed, float time){',
    '  float ringStart = 0.9; float ringWidth = 0.2; float noiseScale = 6.0;',
    '  float noise = mix(noise2D(vec2(decomposed.x, time) * noiseScale), noise2D(vec2(decomposed.y, time) * noiseScale), decomposed.z);',
    '  noise = (noise - 0.5) * 5.0;',
    '  return ringStart + noise * ringWidth;',
    '}',
    'float flow(vec3 decomposed, float time){',
    '  return mix(texture2D(uPerlinTexture, vec2(time, decomposed.x / 2.0)).r, texture2D(uPerlinTexture, vec2(time, decomposed.y / 2.0)).r, decomposed.z);',
    '}',
    'void main(){',
    '  vec2 uv = vUv * 2.0 - 1.0;',
    '  float radius = length(uv);',
    '  float theta = atan(uv.y, uv.x);',
    '  if (theta < 0.0) theta += 2.0 * PI;',
    '  vec3 decomposed = vec3(theta / (2.0 * PI), mod(theta / (2.0 * PI) + 0.5, 1.0) + 1.0, abs(theta / PI - 1.0));',
    '  float noise = flow(decomposed, radius * 0.03 - uAnimation * 0.2) - 0.5;',
    '  theta += noise * mix(0.08, 0.25, uOutputVolume);',
    '  vec4 color = vec4(1.0, 1.0, 1.0, 1.0);',
    '  float originalCenters[7];',
    '  originalCenters[0]=0.0; originalCenters[1]=0.5*PI; originalCenters[2]=1.0*PI; originalCenters[3]=1.5*PI; originalCenters[4]=2.0*PI; originalCenters[5]=2.5*PI; originalCenters[6]=3.0*PI;',
    '  float centers[7];',
    '  for (int i = 0; i < 7; i++){ centers[i] = originalCenters[i] + 0.5 * sin(uTime / 20.0 + uOffsets[i]); }',
    '  float a, b; vec4 ovalColor;',
    '  for (int i = 0; i < 7; i++){',
    '    float noise = texture2D(uPerlinTexture, vec2(mod(centers[i] + uTime * 0.05, 1.0), 0.5)).r;',
    '    a = 0.5 + noise * 0.3;',
    '    b = noise * mix(3.5, 2.5, uInputVolume);',
    '    bool reverseGradient = (i - (i / 2) * 2 == 1);',
    '    float distTheta = min(abs(theta - centers[i]), min(abs(theta + 2.0 * PI - centers[i]), abs(theta - 2.0 * PI - centers[i])));',
    '    float distRadius = radius;',
    '    float softness = 0.6;',
    '    if (drawOval(vec2(distTheta, distRadius), vec2(0.0, 0.0), a, b, reverseGradient, softness, ovalColor)){',
    '      color.rgb = mix(color.rgb, ovalColor.rgb, ovalColor.a);',
    '      color.a = max(color.a, ovalColor.a);',
    '    }',
    '  }',
    '  float ringRadius1 = sharpRing(decomposed, uTime * 0.1);',
    '  float ringRadius2 = smoothRing(decomposed, uTime * 0.1);',
    '  float inputRadius1 = radius + uInputVolume * 0.2;',
    '  float inputRadius2 = radius + uInputVolume * 0.15;',
    '  float opacity1 = mix(0.2, 0.6, uInputVolume);',
    '  float opacity2 = mix(0.15, 0.45, uInputVolume);',
    '  float ringAlpha1 = (inputRadius2 >= ringRadius1) ? opacity1 : 0.0;',
    '  float ringAlpha2 = smoothstep(ringRadius2 - 0.05, ringRadius2 + 0.05, inputRadius1) * opacity2;',
    '  float totalRingAlpha = max(ringAlpha1, ringAlpha2);',
    '  vec3 ringColor = vec3(1.0);',
    '  color.rgb = 1.0 - (1.0 - color.rgb) * (1.0 - ringColor * totalRingAlpha);',
    '  vec3 color1 = vec3(0.098, 0.129, 0.165);',
    '  vec3 color2 = uColor1;',
    '  vec3 color3 = uColor2;',
    '  vec3 color4 = vec3(0.886, 0.890, 0.902);',
    '  float luminance = mix(color.r, 1.0 - color.r, uInverted);',
    '  luminance = clamp((luminance - 0.58) * 1.95 + 0.58, 0.0, 1.0);',
    '  color.rgb = colorRamp(luminance, color1, color2, color3, color4);',
    '  color.a *= uOpacity;',
    '  gl_FragColor = color;',
    '}'
  ].join('\n');

  var renderer;
  try {
    renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true, premultipliedAlpha: true });
  } catch (e) { document.body.classList.add('nogl'); return; }
  renderer.setClearColor(0x000000, 0);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  document.body.appendChild(renderer.domElement);
  // iOS reclaims WebGL contexts under memory pressure — fall back to the gradient orb instead of a blank
  renderer.domElement.addEventListener('webglcontextlost', function (e) {
    e.preventDefault();
    renderer.domElement.style.display = 'none';
    document.body.classList.add('nogl');
  }, false);

  var scene = new THREE.Scene();
  var camera = new THREE.PerspectiveCamera(75, 1, 0.1, 100);
  camera.position.z = 5;

  var offsets = new Float32Array(7);
  for (var i = 0; i < 7; i++) offsets[i] = Math.random() * Math.PI * 2;

  var material = new THREE.ShaderMaterial({
    transparent: true,
    uniforms: {
      uColor1: { value: new THREE.Color('#6E8AA0') },
      uColor2: { value: new THREE.Color('#AFC8CD') },
      uOffsets: { value: offsets },
      uPerlinTexture: { value: null },
      uTime: { value: 0 },
      uAnimation: { value: 0.1 },
      uInverted: { value: 0.0 },
      uInputVolume: { value: 0 },
      uOutputVolume: { value: 0 },
      uOpacity: { value: 0 }
    },
    vertexShader: vertexShader,
    fragmentShader: fragmentShader
  });
  var mesh = new THREE.Mesh(new THREE.CircleGeometry(3.5, 64), material);
  scene.add(mesh);

  var loader = new THREE.TextureLoader();
  loader.setCrossOrigin('anonymous');
  loader.load('perlin-noise.png', function (tex) {
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    material.uniforms.uPerlinTexture.value = tex;
  });

  function resize() {
    var w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  window.addEventListener('resize', resize, { passive: true });
  resize();

  // external drive (voice playback in the parent page postMessages volume here)
  var extActive = false, extOut = 0, extLast = 0;
  window.addEventListener('message', function (e) {
    var d = e.data; if (!d || d.type !== 'orbVolume') return;
    extActive = !!d.active;
    if (typeof d.out === 'number') extOut = d.out;
    extLast = performance.now();
  });

  var curIn = 0, curOut = 0, animSpeed = 0.1, last = performance.now();
  function frame(now) {
    var delta = Math.min((now - last) / 1000, 0.05); last = now;
    var u = material.uniforms;
    u.uTime.value += delta * 0.45;
    if (u.uOpacity.value < 1) u.uOpacity.value = Math.min(1, u.uOpacity.value + delta * 2);
    var t = u.uTime.value * 2.0;
    var targetIn, targetOut;
    if (extActive && (now - extLast < 500)) {
      // driven by the playing voice -> reacts like the agent is talking
      targetIn = Math.max(0, Math.min(1, 0.5 + extOut * 0.5));
      targetOut = Math.max(0, Math.min(1, 0.45 + extOut * 0.55));
    } else {
      // calm metallic idle: low input keeps the steel->silver gradient + soft rings (no white blow-out)
      targetIn = 0.42 + 0.08 * Math.sin(t * 0.8);
      targetOut = 0.56 + 0.10 * Math.sin(t * 0.7 + 1.0);
    }
    curIn += (targetIn - curIn) * 0.2;
    curOut += (targetOut - curOut) * 0.2;
    var targetSpeed = 0.1 + (1 - Math.pow(curOut - 1, 2)) * 0.9;
    animSpeed += (targetSpeed - animSpeed) * 0.12;
    u.uAnimation.value += delta * animSpeed * 1.5;
    u.uInputVolume.value = curIn;
    u.uOutputVolume.value = curOut;
    // slowly rotate the inner shape; a touch faster while the voice is active
    mesh.rotation.z -= delta * (0.12 + curOut * 0.13);
    renderer.render(scene, camera);
    // keep rendering even under reduced-motion: the loop only ran ONE frame there — which drew before the
    // async perlin texture had loaded (null sampler → transparent orb) and never re-rendered. A gentle
    // ambient orb is fine to keep alive; this guarantees it stays visible once the texture arrives.
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
