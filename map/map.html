<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Degla — Live mission map</title>

<style>
  @font-face{font-family:'Geist';font-style:normal;font-weight:100 900;font-display:swap;src:url(../fonts/geist.woff2) format('woff2')}
  :root {
    --blue: #6E8AA0;
    --blue-bright: #9FB0BD;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #0b0c0f;
    font-family: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  /* vignette + subtle darkening like the reference */
  #vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 5;
    background:
      radial-gradient(120% 90% at 50% 38%, rgba(0,0,0,0) 50%, rgba(0,0,0,0.6) 100%);
  }

  /* ---- HTML overlay pins / labels ---- */
  #overlay { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
  .pin { position: absolute; transform: translate(-50%, -100%); will-change: transform, left, top; }

  /* incident / target pin (teardrop) */
  .teardrop {
    width: 28px; height: 28px; position: relative;
    background: var(--blue);
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    box-shadow: 0 6px 16px rgba(0,0,0,0.6), 0 0 12px rgba(110,138,160,0.4);
  }
  .teardrop::after {
    content: ""; position: absolute; left: 50%; top: 50%;
    width: 10px; height: 10px; background: #fff; border-radius: 50%;
    transform: translate(-50%, -50%);
  }
  .pin-label {
    position: absolute; left: 38px; top: -2px; white-space: nowrap;
  }
  /* when the pin sits near the right edge, anchor its label to the left so it stays on-card */
  .pin.flip-left .pin-label { left: auto; right: 38px; text-align: right; }
  /* compact the label on narrow cards so it fits beside the pin */
  @media (max-width: 640px) {
    .pin-label .eyebrow { font-size: 10px; }
    .pin-label .title { font-size: 12px; max-width: 150px; }
  }
  .pin-label .eyebrow {
    color: var(--blue); font-size: 11px; font-weight: 700;
    letter-spacing: 0.10em; text-transform: uppercase; line-height: 1.25;
  }
  .pin-label .title {
    color: #fff; font-size: 13px; font-weight: 500; line-height: 1.3;
    max-width: 230px; white-space: normal; margin-top: 2px;
  }

  /* faint street labels */
  .street-label {
    position: absolute; transform: translate(-50%, -50%);
    color: rgba(255,255,255,0.30); font-size: 9px; letter-spacing: 0.10em;
    text-transform: uppercase; white-space: nowrap; font-weight: 500;
  }

  /* inbound drone origin tags */
  .origin-tag {
    position: absolute; transform: translate(-50%, -50%);
    white-space: nowrap; pointer-events: none;
    color: var(--blue); font-size: 10px; font-weight: 700;
    letter-spacing: 0.10em; text-transform: uppercase;
  }
  .origin-tag .dist { color: rgba(255,255,255,0.7); font-weight: 500; letter-spacing: 0.02em; }

  #hint {
    position: fixed; right: 16px; bottom: 13px; z-index: 12;
    color: rgba(255,255,255,0.32); font-size: 10px; letter-spacing: 0.10em;
    text-transform: uppercase; pointer-events: none;
  }
  #brand {
    position: fixed; left: 16px; top: 14px; z-index: 12; pointer-events: none;
  }
  #brand .b1 { color:#fff; font-weight: 700; font-size: 13px; letter-spacing: 0.10em; }
  #brand .b2 {
    color: var(--blue); font-weight: 700; font-size: 10px; letter-spacing: 0.14em;
    text-transform: uppercase; margin-top: 3px; display: flex; align-items: center; gap: 6px;
  }
  #brand .b2::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--blue);
    box-shadow: 0 0 8px var(--blue); animation: live 1.6s ease-in-out infinite;
  }
  @keyframes live { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  @media (prefers-reduced-motion: reduce) { #brand .b2::before { animation: none; } }
</style>
</head>
<body>
  <div id="app"></div>
  <div id="vignette"></div>

  <div id="overlay">
    <!-- incident / target pin -->
    <div class="pin" id="museumPin">
      <div class="teardrop"></div>
      <div class="pin-label">
        <div class="eyebrow">Collapse site &middot; Sector 7</div>
        <div class="title">Last known position &middot; survivors</div>
      </div>
    </div>
    <!-- inbound drone origin labels injected by scene.js -->
  </div>

  <div id="hint">Drag to orbit &middot; scroll to zoom</div>

  <script src="../vendor/three.min.js"></script>
  <script src="../vendor/OrbitControls.js"></script>
  <script src="city.js"></script>
  <script src="scene.js"></script>
</body>
</html>
